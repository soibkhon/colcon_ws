# nav2_params.yaml - Local costmap-based navigation for safe wheelchair operation
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: odom                  # Using odom as global frame for local navigation
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: True
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_smooth_path_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_assisted_teleop_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_drive_on_heading_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_globally_updated_goal_condition_bt_node
    - nav2_is_path_valid_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_truncate_path_local_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_path_expiring_timer_condition
    - nav2_distance_traveled_condition_bt_node
    - nav2_single_trigger_bt_node
    - nav2_goal_updated_controller_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node
    - nav2_goal_checker_selector_bt_node
    - nav2_controller_cancel_bt_node
    - nav2_path_longer_on_approach_bt_node
    - nav2_wait_cancel_bt_node
    - nav2_spin_cancel_bt_node
    - nav2_back_up_cancel_bt_node
    - nav2_assisted_teleop_cancel_bt_node
    - nav2_drive_on_heading_cancel_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0          # Slower for more careful control
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker - more lenient for wheelchair
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.4
      movement_time_allowance: 30.0
    
    # Goal checker - relaxed tolerances
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.1
    
    # DWB controller with PROPER CRITICS CONFIGURATION
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.15                  # Allow slow reverse
      min_vel_y: 0.0
      max_vel_x: 0.25                   # Very slow forward
      max_vel_y: 0.0
      max_vel_theta: 0.2                # Slow rotation
      min_speed_xy: 0.0
      max_speed_xy: 0.25
      min_speed_theta: 0.0
      acc_lim_x: 0.15
      acc_lim_y: 0.0
      acc_lim_theta: 0.15
      decel_lim_x: -0.2
      decel_lim_y: 0.0
      decel_lim_theta: -0.2
      
      # Trajectory generation
      vx_samples: 10
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 3.0                     # Look further ahead
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.2
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      stateful: True
      
      # CRITICAL: Proper critics configuration for obstacle avoidance
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "PathAlign", "PathDist", "GoalAlign", "GoalDist"]
      
      # OBSTACLE AVOIDANCE - THIS IS CRITICAL!
      ObstacleFootprint.scale: 100.0    # VERY HIGH - top priority for safety
      ObstacleFootprint.sum_scores: False
      ObstacleFootprint.footprint_topic: "local_costmap/published_footprint"
      
      # Path following - reduced importance for local navigation
      PathAlign.scale: 10.0             # Reduced from 20.0
      PathAlign.forward_point_distance: 0.3
      PathAlign.aggregation_type: "last"
      
      PathDist.scale: 10.0              # Reduced from 20.0
      PathDist.aggregation_type: "last"
      
      # Goal reaching - moderate importance
      GoalAlign.scale: 15.0
      GoalAlign.forward_point_distance: 0.3
      GoalAlign.aggregation_type: "last"
      
      GoalDist.scale: 15.0
      GoalDist.aggregation_type: "last"
      
      # Rotation control
      RotateToGoal.scale: 20.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      RotateToGoal.allow_backwards: false
      
      # Oscillation prevention
      Oscillation.scale: 30.0
      Oscillation.oscillation_reset_dist: 0.1
      Oscillation.oscillation_reset_angle: 0.2

# Local costmap - PRIMARY for navigation
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom                # Local navigation in odom frame
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 8                          # Larger local map for better planning
      height: 8
      resolution: 0.04                  # Fine resolution for obstacle detection
      origin_x: 0.0
      origin_y: 0.0
      robot_radius: 0.15                 # Safety radius around wheelchair
      
      # Wheelchair footprint with safety margin
      footprint: "[[0.75, 0.35], [0.75, -0.35], [-0.2, -0.4], [-0.2, 0.4]]"
      footprint_padding: 0.05           # Additional padding
      
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        scan:
          topic: /scan
          sensor_frame: livox_frame     
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0       # Good clearing range
          raytrace_min_range: 0.2       # Don't clear too close
          obstacle_max_range: 4.5       # See obstacles far
          obstacle_min_range: 0.2       # But not inside robot
          inf_is_valid: true            # Handle inf values properly
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0        # Steep cost gradient for safety
        inflation_radius: 0.15           # Large safety buffer
        inflate_unknown: true           # Treat unknown as obstacle
        inflate_around_unknown: true
        
      always_send_full_costmap: True

# Global costmap - Also using rolling window for local navigation
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0             # Slower update for global
      publish_frequency: 1.0
      global_frame: odom                # Use odom for local navigation
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true              # Rolling window for local navigation
      width: 15                         # Larger than local for longer range planning
      height: 15
      resolution: 0.08                  # Coarser than local costmap
      origin_x: 0.0
      origin_y: 0.0
      robot_radius: 0.15
      track_unknown_space: true
      
      # Same footprint
      footprint: "[[0.75, 0.35], [0.75, -0.35], [-0.2, -0.4], [-0.2, 0.4]]"
      footprint_padding: 0.05
      
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        scan:
          topic: /scan
          sensor_frame: livox_frame
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.2
          obstacle_max_range: 4.5
          obstacle_min_range: 0.2
          inf_is_valid: true
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.15
        inflate_unknown: true
        inflate_around_unknown: true
        
      always_send_full_costmap: True

# Simple planner for local navigation
planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: False                 # Dijkstra might work better for local
      allow_unknown: false              # Don't plan through unknown space

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True
      w_data: 0.2
      w_smooth: 0.3

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom                 # Use odom for local navigation
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.2
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.15

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 0.3]      # Match controller velocities
    min_velocity: [-0.2, 0.0, -0.3]
    max_accel: [0.2, 0.0, 0.25]
    max_decel: [-0.3, 0.0, -0.3]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# Lifecycle manager for local navigation (no map server or amcl needed)
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names: ['controller_server', 'planner_server', 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother']
