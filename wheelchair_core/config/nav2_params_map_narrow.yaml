    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 3.0
    laser_max_range: 9.0
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    max_beams: 120                   # REDUCED: 150 → 120
    max_particles: 4000              # REDUCED: 6000 → 4000
    min_particles: 2000              # REDUCED: 2500 → 2000
    odom_frame_id: "odom"
