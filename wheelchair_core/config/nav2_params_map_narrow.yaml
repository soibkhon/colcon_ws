    tf_broadcast: true
    transform_tolerance: 0.8
    update_min_a: 0.08               # INCREASED: 0.06 → 0.08 (~5°)
    update_min_d: 0.10               # INCREASED: 0.08 → 0.10 (10cm)
    z_hit: 0.65
    z_max: 0.05
    z_rand: 0.3
    z_short: 0.05
    scan_topic: scan
    
    set_initial_pose: true
    initial_pose:
      x: 7.6      
      y: 5.38    
      z: 0.0
      yaw: 0.0    
    
    initial_cov_xx: 1.0
    initial_cov_yy: 1.0
    initial_cov_aa: 0.5

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 25
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 30.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.25, 0.0, 0.35]  # INCREASED: rotation 0.3 → 0.35
    min_velocity: [-0.12, 0.0, -0.35]
    max_accel: [0.18, 0.0, 0.25]     # INCREASED: 0.15 → 0.18, 0.2 → 0.25
    max_decel: [-0.35, 0.0, -0.4]    # INCREASED: -0.3 → -0.35, -0.35 → -0.4
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names: ['map_server', 'amcl', 'controller_server', 'planner_server', 'smoother_server', 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother']
