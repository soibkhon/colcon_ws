bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.25
      movement_time_allowance: 40.0
    
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.1
    
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False  # CHANGED: Disable debug for performance
      
      # Velocity - slower for narrow passages, penalize reverse (blind spot)
      min_vel_x: -0.10
      min_vel_y: 0.0
      max_vel_x: 0.20
      max_vel_y: 0.0
      max_vel_theta: 0.3           # INCREASED: Faster rotation
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.0
      acc_lim_x: 0.15              # INCREASED: Faster acceleration
      acc_lim_y: 0.0
      acc_lim_theta: 0.25          # INCREASED: Faster rotation accel
      decel_lim_x: -0.25
      decel_lim_y: 0.0
      decel_lim_theta: -0.35       # INCREASED: Faster deceleration
      
      # OPTIMIZED SAMPLING - Balance quality and speed
      vx_samples: 15               # REDUCED: 30 → 15 (50% reduction)
      vy_samples: 1
      vtheta_samples: 25           # REDUCED: 50 → 25 (50% reduction)
      sim_time: 2.5                # REDUCED: 4.0 → 2.5 (less lookahead)
      linear_granularity: 0.05     # INCREASED: 0.03 → 0.05 (coarser)
      angular_granularity: 0.025   # INCREASED: 0.015 → 0.025 (coarser)
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.03
      short_circuit_trajectory_evaluation: True  # CRITICAL: Enable early exit
      stateful: True
      
      # Reordered critics for faster short-circuiting
      # ObstacleFootprint first to quickly reject colliding trajectories
      critics: ["ObstacleFootprint", "Oscillation", "BaseObstacle", "PathAlign", "PathDist", "GoalAlign", "GoalDist", "RotateToGoal", "Twirling"]
      
      ObstacleFootprint.scale: 200.0    # INCREASED: Reject collisions faster
      ObstacleFootprint.sum_scores: False
      
      BaseObstacle.scale: 60.0          # INCREASED: Higher priority
      BaseObstacle.sum_scores: True
      
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.25
      PathAlign.aggregation_type: "last"
      
      PathDist.scale: 32.0
      PathDist.aggregation_type: "last"
      
      GoalAlign.scale: 20.0             # INCREASED: Stronger goal attraction
      GoalAlign.forward_point_distance: 0.25
      GoalAlign.aggregation_type: "last"
      
      GoalDist.scale: 20.0              # INCREASED: Stronger goal attraction
      GoalDist.aggregation_type: "last"
      
      RotateToGoal.scale: 32.0          # INCREASED: Faster rotation to goal
      RotateToGoal.slowing_factor: 5.0  # REDUCED: Less slowing
      RotateToGoal.lookahead_time: -1.0
      RotateToGoal.allow_backwards: false
      
      Oscillation.scale: 45.0
      Oscillation.oscillation_reset_dist: 0.06
      Oscillation.oscillation_reset_angle: 0.12
      
      Twirling.scale: 15.0

# =============================================================================
# LOCAL COSTMAP - OPTIMIZED for performance
# =============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 7.0          # REDUCED: 10 → 7 Hz (less computation)
      publish_frequency: 3.0         # REDUCED: 5 → 3 Hz
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 8                       # REDUCED: 10 → 8m (36% fewer cells)
      height: 8
      resolution: 0.03               # INCREASED: 0.025 → 0.03 (44% fewer cells)
      
      # Wheelchair footprint - NO robot_radius (causes conflicts)
      footprint: "[[0.75, 0.33], [0.75, -0.33], [-0.2, -0.33], [-0.2, 0.33]]"
      footprint_padding: 0.02
      
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True
        map_topic: "/map"
        subscribe_to_updates: True
        
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        combination_method: 1
        scan:
          topic: /scan
          sensor_frame: livox_frame     
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.12
          obstacle_max_range: 5.5
          obstacle_min_range: 0.12
          inf_is_valid: true
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.06
        inflate_unknown: false
        inflate_around_unknown: false
        
      always_send_full_costmap: True

# =============================================================================
# GLOBAL COSTMAP
# =============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0          # REDUCED: 3 → 2 Hz
      publish_frequency: 1.0         # REDUCED: 2 → 1 Hz
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      
      rolling_window: false
      track_unknown_space: true
      unknown_cost_value: 255
      trinary_costmap: false
      use_maximum: false
      lethal_cost_threshold: 253
      
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True
        map_topic: "/map"
        subscribe_to_updates: True
        lethal_cost_threshold: 100
        unknown_cost_value: -1
        trinary_costmap: false
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        min_obstacle_height: 0.0
        combination_method: 1
        scan:
          topic: /scan
          sensor_frame: livox_frame
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.12
          obstacle_max_range: 5.5
          obstacle_min_range: 0.12
          inf_is_valid: true
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.06
        inflate_unknown: false
        inflate_around_unknown: false
        
      always_send_full_costmap: True

# =============================================================================
# PLANNER - Using Smac Hybrid-A*
# =============================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 15.0  # REDUCED: 20 → 15 (planning less critical)
    use_sim_time: False
    planner_plugins: ["GridBased"]
    
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.1
      allow_unknown: false
      max_iterations: 2000000        # REDUCED: 3M → 2M (still plenty)
      max_on_approach_iterations: 2000
      max_planning_time: 5.0         # REDUCED: 8 → 5 seconds
      
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 144   # REDUCED: 180 → 144 (2.5° resolution)
      analytic_expansion_ratio: 4.5
      analytic_expansion_max_length: 5.0
      analytic_expansion_max_cost: 250.0
      analytic_expansion_max_cost_override: false
      
      minimum_turning_radius: 0.30
      reverse_penalty: 4.0
      change_penalty: 0.3
      non_straight_penalty: 1.1
      cost_penalty: 2.0
      retrospective_penalty: 0.02
      lookup_table_size: 30.0
      cache_obstacle_heuristic: true
      
      smooth_path: True
      smoother:
        max_iterations: 500          # REDUCED: 1000 → 500
        w_smooth: 0.3
        w_data: 0.25
        tolerance: 1.0e-8            # RELAXED: 1e-9 → 1e-8
        do_refinement: True
        refinement_num: 2            # REDUCED: 3 → 2

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-9
      max_its: 1000                  # REDUCED: 2000 → 1000
      do_refinement: True
      w_data: 0.25
      w_smooth: 0.3

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 15.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0         # REDUCED: 3.0 → 2.0
    max_rotational_vel: 0.3          # INCREASED: 0.2 → 0.3
    min_rotational_vel: 0.05         # INCREASED: 0.04 → 0.05
    rotational_acc_lim: 0.2          # INCREASED: 0.12 → 0.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

