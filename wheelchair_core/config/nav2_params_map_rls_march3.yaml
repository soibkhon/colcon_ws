	# nav2_params.yaml - Map-based navigation with AMCL localization for wheelchair
	# MODIFIED: AMCL configured to converge quickly then naturally lock using only config
	# Uses global static map with local costmap for obstacle avoidance
	bt_navigator:
	  ros__parameters:
	    use_sim_time: False
	    global_frame: map                   # Using map as global frame
	    robot_base_frame: base_link
	    odom_topic: /odom
	    bt_loop_duration: 10
	    default_server_timeout: 20
	    enable_groot_monitoring: True
	    groot_zmq_publisher_port: 1666
	    groot_zmq_server_port: 1667
	    plugin_lib_names:
	    - nav2_compute_path_to_pose_action_bt_node
	    - nav2_compute_path_through_poses_action_bt_node
	    - nav2_smooth_path_action_bt_node
	    - nav2_follow_path_action_bt_node
	    - nav2_spin_action_bt_node
	    - nav2_wait_action_bt_node
	    - nav2_assisted_teleop_action_bt_node
	    - nav2_back_up_action_bt_node
	    - nav2_drive_on_heading_bt_node
	    - nav2_clear_costmap_service_bt_node
	    - nav2_is_stuck_condition_bt_node
	    - nav2_goal_reached_condition_bt_node
	    - nav2_goal_updated_condition_bt_node
	    - nav2_globally_updated_goal_condition_bt_node
	    - nav2_is_path_valid_condition_bt_node
	    - nav2_initial_pose_received_condition_bt_node
	    - nav2_reinitialize_global_localization_service_bt_node
	    - nav2_rate_controller_bt_node
	    - nav2_distance_controller_bt_node
	    - nav2_speed_controller_bt_node
	    - nav2_truncate_path_action_bt_node
	    - nav2_truncate_path_local_action_bt_node
	    - nav2_goal_updater_node_bt_node
	    - nav2_recovery_node_bt_node
	    - nav2_pipeline_sequence_bt_node
	    - nav2_round_robin_node_bt_node
	    - nav2_transform_available_condition_bt_node
	    - nav2_time_expired_condition_bt_node
	    - nav2_path_expiring_timer_condition
	    - nav2_distance_traveled_condition_bt_node
	    - nav2_single_trigger_bt_node
	    - nav2_goal_updated_controller_bt_node
	    - nav2_is_battery_low_condition_bt_node
	    - nav2_navigate_through_poses_action_bt_node
	    - nav2_navigate_to_pose_action_bt_node
	    - nav2_remove_passed_goals_action_bt_node
	    - nav2_planner_selector_bt_node
	    - nav2_controller_selector_bt_node
	    - nav2_goal_checker_selector_bt_node
	    - nav2_controller_cancel_bt_node
	    - nav2_path_longer_on_approach_bt_node
	    - nav2_wait_cancel_bt_node
	    - nav2_spin_cancel_bt_node
	    - nav2_back_up_cancel_bt_node
	    - nav2_assisted_teleop_cancel_bt_node
	    - nav2_drive_on_heading_cancel_bt_node

	bt_navigator_navigate_through_poses_rclcpp_node:
	  ros__parameters:
	    use_sim_time: False

	bt_navigator_navigate_to_pose_rclcpp_node:
	  ros__parameters:
	    use_sim_time: False

	controller_server:
	  ros__parameters:
	    use_sim_time: False
	    controller_frequency: 20.0          
	    min_x_velocity_threshold: 0.01
	    min_y_velocity_threshold: 0.5
	    min_theta_velocity_threshold: 0.01
	    failure_tolerance: 0.3
	    progress_checker_plugin: "progress_checker"
	    goal_checker_plugins: ["general_goal_checker"]
	    controller_plugins: ["FollowPath"]

	    
	    progress_checker:
	      plugin: "nav2_controller::SimpleProgressChecker"
	      required_movement_radius: 0.4
	      movement_time_allowance: 30.0
	    
	    
	    general_goal_checker:
	      stateful: True
	      plugin: "nav2_controller::SimpleGoalChecker"
	      xy_goal_tolerance: 0.2
	      yaw_goal_tolerance: 0.1
	    
	    
	    FollowPath:
	      plugin: "dwb_core::DWBLocalPlanner"
	      debug_trajectory_details: True
	      min_vel_x: -0.15                  # Allow slow reverse
	      min_vel_y: 0.0
	      max_vel_x: 0.25                   
	      max_vel_y: 0.0
	      max_vel_theta: 0.2                
	      min_speed_xy: 0.0
	      max_speed_xy: 0.4
	      min_speed_theta: 0.0
	      acc_lim_x: 0.15
	      acc_lim_y: 0.0
	      acc_lim_theta: 0.15
	      decel_lim_x: -0.2
	      decel_lim_y: 0.0
	      decel_lim_theta: -0.2
	      
	      vx_samples: 8
	      vy_samples: 1
	      vtheta_samples: 40
	      sim_time: 1.7
	      linear_granularity: 0.05
	      angular_granularity: 0.025
	      transform_tolerance: 0.2
	      xy_goal_tolerance: 0.2
	      trans_stopped_velocity: 0.05
	      short_circuit_trajectory_evaluation: True
	      stateful: True
	      

	      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
	      
	      BaseObstacle.scale: 0.02
	      
	      PathAlign.scale: 32.0
	      PathAlign.forward_point_distance: 0.1
	      
	      GoalAlign.scale: 24.0
	      GoalAlign.forward_point_distance: 0.1
	      
	      PathDist.scale: 32.0
	      GoalDist.scale: 24.0
	      
	      RotateToGoal.scale: 32.0
	      RotateToGoal.slowing_factor: 5.0
	      RotateToGoal.lookahead_time: -1.0
	      
	      Oscillation.scale: 1.0

	# Local costmap - PRIMARY for navigation
	local_costmap:
	  local_costmap:
	    ros__parameters:
	      update_frequency: 5.0
	      publish_frequency: 2.0
	      global_frame: odom                # Local navigation in odom frame
	      robot_base_frame: base_link
	      use_sim_time: False
	      rolling_window: true
	      width: 8                          # Larger local map for better planning
	      height: 8
	      resolution: 0.025                  # Fine resolution for obstacle detection
	      origin_x: 0.0
	      origin_y: 0.0
	      robot_radius: 0.15                 # Safety radius around wheelchair
	      
	      # Wheelchair footprint with safety margin
	      footprint: "[[0.75, 0.33], [0.75, -0.33], [-0.2, -0.33], [-0.2, 0.33]]"
	      footprint_padding: 0.05           # Additional padding
	      
	      plugins: ["obstacle_layer", "inflation_layer"]
	      
	      obstacle_layer:
		plugin: "nav2_costmap_2d::ObstacleLayer"
		enabled: True
		observation_sources: scan
		footprint_clearing_enabled: true
		max_obstacle_height: 2.0
		min_obstacle_height: 0.0
		scan:
		  topic: /scan
		  sensor_frame: livox_frame     
		  max_obstacle_height: 2.0
		  min_obstacle_height: 0.0
		  clearing: True
		  marking: True
		  data_type: "LaserScan"
		  raytrace_max_range: 5.0       # Good clearing range
		  raytrace_min_range: 0.2       # Don't clear too close
		  obstacle_max_range: 4.5       # See obstacles far
		  obstacle_min_range: 0.2       # But not inside robot
		  inf_is_valid: true            # Handle inf values properly
		  
	      inflation_layer:
		plugin: "nav2_costmap_2d::InflationLayer"
		cost_scaling_factor: 8.0
		inflation_radius: 0.30
		inflate_unknown: true
		inflate_around_unknown: true
		
	      always_send_full_costmap: True

	# Global costmap - Using static map for global planning
	global_costmap:
	  global_costmap:
	    ros__parameters:
	      update_frequency: 2.0             # Slower update for global
	      publish_frequency: 1.0
	      global_frame: map                 # Use map frame for global navigation
	      robot_base_frame: base_link
	      use_sim_time: False
	      rolling_window: false             # Static map mode
	      track_unknown_space: true
	      robot_radius: 0.15
	      
	      # Same footprint
	      footprint: "[[0.75, 0.33], [0.75, -0.33], [-0.2, -0.33], [-0.2, 0.33]]"
	      footprint_padding: 0.05
	      
	      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
	      
	      static_layer:
		plugin: "nav2_costmap_2d::StaticLayer"
		enabled: True
		map_subscribe_transient_local: True
		map_topic: "/map"
	      
	      obstacle_layer:
		plugin: "nav2_costmap_2d::ObstacleLayer"
		enabled: True
		observation_sources: scan
		footprint_clearing_enabled: true
		max_obstacle_height: 2.0
		min_obstacle_height: 0.0
		scan:
		  topic: /scan
		  sensor_frame: livox_frame
		  max_obstacle_height: 2.0
		  min_obstacle_height: 0.0
		  clearing: True
		  marking: True
		  data_type: "LaserScan"
		  raytrace_max_range: 5.0
		  raytrace_min_range: 0.2
		  obstacle_max_range: 4.5
		  obstacle_min_range: 0.2
		  inf_is_valid: true
		  
	      inflation_layer:
		plugin: "nav2_costmap_2d::InflationLayer"
		cost_scaling_factor: 8.0
		inflation_radius: 0.30
		inflate_unknown: true
		inflate_around_unknown: true
		
	      always_send_full_costmap: True

	# Global planner for map-based navigation
	planner_server:
	  ros__parameters:
	    expected_planner_frequency: 10.0
	    use_sim_time: False
	    planner_plugins: ["GridBased"]
	    GridBased:
	      plugin: "nav2_navfn_planner/NavfnPlanner"
	      tolerance: 0.5
	      use_astar: True                   # A* for better global planning with map
	      allow_unknown: false              # Don't plan through unknown space

	smoother_server:
	  ros__parameters:
	    use_sim_time: False
	    smoother_plugins: ["simple_smoother"]
	    simple_smoother:
	      plugin: "nav2_smoother::SimpleSmoother"
	      tolerance: 1.0e-10
	      max_its: 1000
	      do_refinement: True
	      w_data: 0.2
	      w_smooth: 0.3

	behavior_server:
	  ros__parameters:
	    costmap_topic: local_costmap/costmap_raw
	    footprint_topic: local_costmap/published_footprint
	    cycle_frequency: 10.0
	    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
	    spin:
	      plugin: "nav2_behaviors/Spin"
	    backup:
	      plugin: "nav2_behaviors/BackUp"
	    drive_on_heading:
	      plugin: "nav2_behaviors/DriveOnHeading"
	    wait:
	      plugin: "nav2_behaviors/Wait"
	    assisted_teleop:
	      plugin: "nav2_behaviors/AssistedTeleop"
	    global_frame: map                  # Use map for global navigation
	    robot_base_frame: base_link
	    transform_tolerance: 0.1
	    use_sim_time: false
	    simulate_ahead_time: 2.0
	    max_rotational_vel: 0.2
	    min_rotational_vel: 0.05
	    rotational_acc_lim: 0.15

	robot_state_publisher:
	  ros__parameters:
	    use_sim_time: False

	# AMCL configured to naturally lock after initial convergence - CONFIG ONLY APPROACH
	# Strategy: Very small particle count, minimal motion noise, and large update thresholds
	# This makes AMCL converge quickly initially, then essentially stop updating
	amcl:
	  ros__parameters:
	    use_sim_time: False
	    
	    # ============================================================================
	    # LOCKING STRATEGY: Minimal motion noise = particles stay clustered
	    # ============================================================================
	    alpha1: 0.001              # Extremely low rotation noise from rotation
	    alpha2: 0.001              # Extremely low rotation noise from translation  
	    alpha3: 0.001              # Extremely low translation noise from translation
	    alpha4: 0.001              # Extremely low translation noise from rotation
	    alpha5: 0.001              # Extremely low strafe noise
	    # Effect: Particles barely spread during motion, keeping pose locked
	    
	    base_frame_id: "base_link"
	    beam_skip_distance: 0.5
	    beam_skip_error_threshold: 0.9
	    beam_skip_threshold: 0.3
	    do_beamskip: false
	    global_frame_id: "map"
	    lambda_short: 0.1
	    
	    # ============================================================================
	    # LOCKING STRATEGY: High max distance means particles are less sensitive
	    # ============================================================================
	    laser_likelihood_max_dist: 3.0     # Increased - more forgiving to small errors
	    laser_max_range: 9.0
	    laser_min_range: 0.1
	    laser_model_type: "likelihood_field"
	    max_beams: 60
	    odom_frame_id: "odom"
	    
	    # ============================================================================
	    # LOCKING STRATEGY: Very tight convergence threshold + low error tolerance
	    # ============================================================================
	    pf_err: 0.01               # Very tight - converges quickly then stays
	    pf_z: 0.995                # High confidence required
	    
	    # ============================================================================
	    # LOCKING STRATEGY: Disable recovery - don't try to relocalize
	    # ============================================================================
	    recovery_alpha_fast: 0.0   # No recovery - stay locked
	    recovery_alpha_slow: 0.0   # No recovery - stay locked
	    
	    resample_interval: 2       # Less frequent resampling once converged
	    robot_model_type: "nav2_amcl::DifferentialMotionModel"
	    save_pose_rate: 0.5
	    
	    # ============================================================================
	    # LOCKING STRATEGY: Lower sigma = particles agree quickly
	    # ============================================================================
	    sigma_hit: 0.15            # Lower = faster agreement among particles
	    
	    tf_broadcast: true
	    transform_tolerance: 1.0
	    
	    # ============================================================================
	    # LOCKING STRATEGY: High weight on hits, low on random/short
	    # ============================================================================
	    z_hit: 0.8                 # High confidence in good readings
	    z_max: 0.05
	    z_rand: 0.1                # Low random noise weight
	    z_short: 0.05              # Low short reading weight
	    
	    scan_topic: scan
	    
	    # ============================================================================
	    # Initial pose at wheelchair starting position
	    # ============================================================================
	    set_initial_pose: true
	    initial_pose:
	      x: 7.6      
	      y: 5.38    
	      z: 0.0
	      yaw: 0.0    
	    
	    # ============================================================================
	    # LOCKING STRATEGY: Very low initial uncertainty for quick convergence
	    # ============================================================================
	    initial_cov_xx: 0.15       # Small uncertainty - we know where we are
	    initial_cov_yy: 0.15       # Small uncertainty
	    initial_cov_aa: 0.15       # Small heading uncertainty (~8 degrees)
	    # Effect: Particles start clustered, converge fast, stay clustered
	    
	    # ============================================================================
	    # LOCKING STRATEGY: Small particle count = less computation, faster convergence
	    # ============================================================================
	    min_particles: 100         # Small count - computationally efficient
	    max_particles: 300         # Won't expand much due to low noise
	    # Effect: Few particles = behaves almost like fixed localization
	    
	    # ============================================================================
	    # LOCKING STRATEGY: Large update thresholds = only update on significant motion
	    # ============================================================================
	    update_min_a: 0.5          # Update only after 30 degree rotation
	    update_min_d: 1.0          # Update only after 1 meter movement
	    # Effect: For typical wheelchair motion, updates are very rare
	    # After initial convergence, AMCL essentially stops updating
	    
	    # ============================================================================
	    # RESULT: AMCL will:
	    # 1. Start with 100-300 tightly clustered particles around initial pose
	    # 2. Converge quickly (seconds) due to small particle count and low noise
	    # 3. Rarely update due to large thresholds (1m/30° movements are rare)
	    # 4. Stay locked due to minimal motion noise (alpha = 0.001)
	    # 5. Not relocalize due to disabled recovery
	    # 
	    # This creates a "soft lock" that:
	    # - Allows initial convergence when robot first moves
	    # - Effectively freezes after ~10-20 seconds of movement
	    # - Uses only configuration, no external scripts needed
	    # ============================================================================

	map_server:
	  ros__parameters:
	    use_sim_time: False
	    yaml_filename: ""  # Set via launch file

	waypoint_follower:
	  ros__parameters:
	    use_sim_time: False
	    loop_rate: 20
	    stop_on_failure: false
	    waypoint_task_executor_plugin: "wait_at_waypoint"
	    wait_at_waypoint:
	      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
	      enabled: True
	      waypoint_pause_duration: 200

	velocity_smoother:
	  ros__parameters:
	    use_sim_time: False
	    smoothing_frequency: 20.0
	    scale_velocities: false
	    feedback: "OPEN_LOOP"
	    max_velocity: [0.3, 0.0, 0.3]      # Match controller velocities
	    min_velocity: [-0.2, 0.0, -0.3]
	    max_accel: [0.2, 0.0, 0.25]
	    max_decel: [-0.3, 0.0, -0.3]
	    odom_topic: "odom"
	    odom_duration: 0.1
	    deadband_velocity: [0.0, 0.0, 0.0]
	    velocity_timeout: 1.0

	# Lifecycle manager for map-based navigation
	lifecycle_manager_navigation:
	  ros__parameters:
	    use_sim_time: False
	    autostart: true
	    node_names: ['map_server', 'amcl', 'controller_server', 'planner_server', 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother']
